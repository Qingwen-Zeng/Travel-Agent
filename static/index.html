<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>The 200 — Travel Guide</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.2.3/dist/purify.min.js"></script>
  </head>
  <body>
    <div id="app">
      <header>
        <div class="brand">
          <span class="dot" aria-hidden="true"></span>
          <span class="brand-text">
            <span class="brand-title">The 200</span>
            <span class="brand-sub">Travel guide</span>
          </span>
        </div>
        <button
          id="clear"
          type="button"
          class="ghost"
          aria-label="Start a new conversation"
        >
          New chat
        </button>
      </header>

      <main id="conversation">
        <section id="empty" class="empty-state">
          <h2>Where are we going?</h2>
          <p>
            I'm the AI travel guide for
            <a href="https://the200.blog" target="_blank" rel="noopener">The 200</a> —
            food, places, and stories from Taiwan, Indonesia, Mexico, Lebanon,
            Denmark, and the US.
          </p>
          <div class="chips" role="list">
            <button class="chip" data-prompt="What should I eat in Taipei?">
              What should I eat in Taipei?
            </button>
            <button class="chip" data-prompt="Plan me 3 days in Oaxaca.">
              3 days in Oaxaca
            </button>
            <button class="chip" data-prompt="Best time of year to visit Lebanon?">
              When to visit Lebanon
            </button>
            <button
              class="chip"
              data-prompt="A weekend in Copenhagen — what shouldn't I miss?"
            >
              Weekend in Copenhagen
            </button>
          </div>
        </section>
        <section id="messages" aria-live="polite"></section>
      </main>

      <form id="composer" autocomplete="off">
        <textarea
          id="input"
          rows="1"
          maxlength="4000"
          placeholder="Ask about a place, a dish, a trip…"
        ></textarea>
        <button id="send" type="submit" aria-label="Send message">
          <svg
            viewBox="0 0 24 24"
            width="18"
            height="18"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M12 19V5M5 12l7-7 7 7" />
          </svg>
        </button>
      </form>
      <p class="hint">
        <kbd>Enter</kbd> to send · <kbd>Shift</kbd>+<kbd>Enter</kbd> for newline
      </p>
    </div>

    <script type="module" src="/static/app.js"></script>
  </body>
</html>
